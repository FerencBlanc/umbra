<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Umbra</title>
    <!-- внутренние таблицы стилей в составе html-документа помещаются в заголовок страницы при помощи тега <style> -->
    <style>
        /*стили для всей страницы*/
        body {
            background-color: black; /*цвет заднего плана*/
            color: white; /*цвет символов*/
            font-family: Arial, sans-serif; /*приоритетный список шрифтов,
            это св-во указывает браузеру, какой шрифт использовать в первую очередь,
            и предлагает запасные варианты на случай, если нужного шрифта не окажется на устройстве пользователя;
            sans-serif это общее семейство, общие семейства (Generic Families) используют как крайний резерв,
            основные варианты, например, sans-serif — шрифты без засечек (более современные, как Arial),
            serif — шрифты с засечками (классические, как Times New Roman)*/
            text-align: center; /*выравнивание текста*/
            padding-top: 100px; /*верхний отступ*/
        }
        /*стили для заголовка*/
        h1 {
            color: #a1280d; /*цвет символов*/
            font-size: 60px; /*размер шрифта*/
        }
        .link-text {
            color: #CFCFCF;
        }
        /*анимация резкого дрожания..
        transform это CSS-свойство, которое позволяет двигать, вращать, масштабировать элемент
        что происходит:
        translate(-2px, 1px)
        -2px сместить на 2 пикселя влево (первый парам. по оХ) (влево, тк отрицательное значение)
        1px сместить на 1 пиксель вниз (второй парам. по оУ) (вниз, тк положительное значение)
        rotate(-1deg)
        -1deg повернуть на 1 градус против часовой стрелки (против чс, тк отрицательное значение)
        итого в кадре 25%: элемент сдвигается чуть влево и вниз, и слегка наклоняется влево*/
        @keyframes sick-link {
            0%, 100% {transform: translate(0, 0) rotate(0deg);}
            25% {transform: translate(-2px, 1px) rotate(-1deg);}
            75% {transform: translate(2px, -1px) rotate(1deg);}
        }
        /*стили для ссылок*/
        a {
            color: #a1280d; /*цвет символов*/
            font-size: 20px; /*размер шрифта*/
            text-decoration: none; /*это св-во отвечает за декоративное оформление текста,
            оно позволяет добавлять или убирать различные линии:
            подчеркивание (underline), линию над текстом (overline) или перечеркивание (line-through),
            а none убирает любое оформление (часто используется для удаления стандартного подчеркивания у ссылок)*/
            display: inline-block; /*это св-во определяет, как элемент отображается на странице,
            какую форму он принимает и как взаимодействует с другими элементами, значение block, например, означает,
            что элем. блочный, всегда начинается с новой строки и занимает всю доступную ширину этой строки, (например, как <p> и <h1>)*/
            margin: 15px 0px; /*отступы вокруг ссылки, 15px сверху и снизу, 0 слева и справа, чтобы они не слипались*/
        }
        a:hover {
            color: #542923; /*цвет ссылки при наведении*/
            text-shadow: 2px 0px 5px rgba(255, 0, 0, 0.55); /*text-shadow это св-во для добавления тени к тексту
            text-shadow: смещение-X смещение-Y радиус размытия;
            поэтому: тень сдвинута на 2 пикселя вправо, не сдвинута вверх или вниз,
            5px означает, что тень размыта на 5 пикселей, это создаёт эффект свечения (чем больше значение, тем мягче и шире тень)*/
            animation: sick-link 0.1s linear infinite;
        }
        /*
        a:visited {
            color: #542923;
        }

    </style>
</head>
<body>
    <h1>UMBRA</h1> <!--главный заголовок-->
    <p>Myths of Darkness</p> <!--обычный текст-->
    <br>
    <p class="link-text">
        Хочешь узнать, куда приведут тебя твои страхи?..
    </p>
    <a href="/test/">Тебе ссюдаа..</a>
    <p class="link-text">
        Хочешь изучить архив существ?..
    </p>
    <a href="/levels/">Тебе ссюдаа..</a>
</body>
</html>
