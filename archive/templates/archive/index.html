<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Umbra</title>
    <!-- внутренние таблицы стилей в составе html-документа помещаются в заголовок страницы при помощи тега <style> -->
    <style>
        /*стили для всей страницы*/
        body {
            background-color: black; /*цвет заднего плана*/
            color: white; /*цвет символов*/
            font-family: Arial, sans-serif; /*приоритетный список шрифтов,
            это св-во указывает браузеру, какой шрифт использовать в первую очередь,
            и предлагает запасные варианты на случай, если нужного шрифта не окажется на устройстве пользователя;
            sans-serif это общее семейство, общие семейства (Generic Families) используют как крайний резерв,
            основные варианты, нпример, sans-serif — шрифты без засечек (более современные, как Arial),
            serif — шрифты с засечками (классические, как Times New Roman)*/
            text-align: center; /*выравнивание текста*/
            padding-top: 100px; /*верхний отступ*/
        }
        /*стили для заголовка*/
        h1 {
            color: #a1280d; /*цвет символов*/
            font-size: 60px; /*размер шрифта*/
        }
    </style>
</head>
<body>
    <h1>UMBRA</h1> <!--главный заголовок-->
    <p>Myths of Darkness</p> <!--обычный текст-->
</body>
</html>
